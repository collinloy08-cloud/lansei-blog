name = "lansei-blog-analytics"
main = "src/index.js"
compatibility_date = "2026-06-01"
workers_dev = true
preview_urls = false
routes = [
  { pattern = "analytics.lansei.top", custom_domain = true },
  { pattern = "admin.lansei.top", custom_domain = true },
  { pattern = "lansei.top/collect", zone_name = "lansei.top" }
]

[assets]
directory = "../.cloudflare/admin-assets"
binding = "ASSETS"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "lansei-blog-analytics"
database_id = "e26d99f5-ada7-469d-91eb-0639ad3414ed"

[vars]
ACCESS_TEAM_DOMAIN = "young-sunset-1bcf.cloudflareaccess.com"
ACCESS_AUD = "a5ffb9324fd39eb53c2fbd98bee233bf0d6f35a534183f44048ae320cc6d5fa3"
GITHUB_REPOSITORY = "collinloy08-cloud/lansei-blog"
GITHUB_BRANCH = "main"
GITHUB_CONTENT_PATH = "content.js"

[observability]
enabled = true
